<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>NIIT Admin Dashboard</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      color:#222;
    }

    .sidebar{
      position:fixed;
      left:0;
      top:0;
      width:250px;
      height:100vh;
      background:#0a2240;
      color:white;
      padding:20px;
      overflow-y:auto;
    }

    .sidebar h2{
      margin-bottom:30px;
      font-size:24px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      margin-bottom:15px;
      padding:10px;
      border-radius:6px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:rgba(255,255,255,0.1);
    }

    .main{
      margin-left:250px;
      padding:30px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.08);
    }

    .card h3{
      font-size:16px;
      margin-bottom:10px;
    }

    .card p{
      font-size:28px;
      font-weight:bold;
      color:#0a2240;
    }

    .section{
      background:white;
      padding:25px;
      border-radius:10px;
      margin-bottom:30px;
      box-shadow:0 0 10px rgba(0,0,0,0.08);
    }

    .section h2{
      margin-bottom:20px;
      color:#0a2240;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    table th,
    table td{
      border:1px solid #ddd;
      padding:12px;
      text-align:left;
    }

    table th{
      background:#0a2240;
      color:white;
    }

    button{
      padding:8px 12px;
      border:none;
      cursor:pointer;
      border-radius:5px;
      margin:2px;
    }

    .approve{
      background:green;
      color:white;
    }

    .reject{
      background:crimson;
      color:white;
    }

    .delete{
      background:black;
      color:white;
    }

    .upload-btn{
      background:#0a2240;
      color:white;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    textarea{
      min-height:120px;
    }

    .status-pending{
      color:orange;
      font-weight:bold;
    }

    .status-approved{
      color:green;
      font-weight:bold;
    }

    .status-rejected{
      color:red;
      font-weight:bold;
    }

    img.preview{
      width:200px;
      margin-top:20px;
      border-radius:10px;
    }

  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>NIIT Admin</h2>

    <a href="#applications">
      <i class="fas fa-user-graduate"></i>
      Applications
    </a>

    <a href="#blogs">
      <i class="fas fa-newspaper"></i>
      Blog Posts
    </a>

    <a href="#uploads">
      <i class="fas fa-image"></i>
      Upload Images
    </a>

    <a href="#announcements">
      <i class="fas fa-bullhorn"></i>
      Announcements
    </a>

    <a href="#analytics">
      <i class="fas fa-chart-line"></i>
      Analytics
    </a>

    <a href="#" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i>
      Logout
    </a>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

      <h1>Dashboard</h1>

      <button onclick="exportCSV()">
        Export CSV
      </button>

    </div>

    <!-- ANALYTICS -->
    <div
      class="cards"
      id="analytics"
    >

      <div class="card">
        <h3>Total Applications</h3>
        <p id="totalApplications">0</p>
      </div>

      <div class="card">
        <h3>Approved</h3>
        <p id="approvedApplications">0</p>
      </div>

      <div class="card">
        <h3>Rejected</h3>
        <p id="rejectedApplications">0</p>
      </div>

      <div class="card">
        <h3>Pending</h3>
        <p id="pendingApplications">0</p>
      </div>

    </div>

    <!-- APPLICATIONS -->
    <div
      class="section"
      id="applications"
    >

      <h2>Applications</h2>

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Program</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="applicationsTable"></tbody>

      </table>

    </div>

    <!-- BLOGS -->
    <div
      class="section"
      id="blogs"
    >

      <h2>Create Blog Post</h2>

      <input
        type="text"
        id="blogTitle"
        placeholder="Blog title"
      />

      <textarea
        id="blogContent"
        placeholder="Blog content"
      ></textarea>

      <button
        class="upload-btn"
        onclick="createPost()"
      >
        Publish Blog
      </button>

    </div>

    <!-- IMAGE UPLOAD -->
    <div
      class="section"
      id="uploads"
    >

      <h2>Upload Website Images</h2>

      <input
        type="file"
        id="imageFile"
      />

      <button
        class="upload-btn"
        onclick="uploadImage()"
      >
        Upload Image
      </button>

      <img
        id="preview"
        class="preview"
      />

    </div>

    <!-- ANNOUNCEMENTS -->
    <div
      class="section"
      id="announcements"
    >

      <h2>Create Announcement</h2>

      <input
        type="text"
        id="announcementTitle"
        placeholder="Announcement title"
      />

      <textarea
        id="announcementContent"
        placeholder="Announcement content"
      ></textarea>

      <button
        class="upload-btn"
        onclick="createAnnouncement()"
      >
        Publish Announcement
      </button>

    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script>

    // CHECK LOGIN
    async function checkUser(){

      const {
        data:{ user }
      } = await supabaseClient.auth.getUser();

      if(!user){
        window.location.href = "admin.html";
      }
    }

    checkUser();

    // LOAD APPLICATIONS
    async function loadApplications(){

      const { data, error } =
        await supabaseClient
          .from('applications')
          .select('*')
          .order('created_at', {
            ascending:false
          });

      if(error){
        console.error(error);
        return;
      }

      const table =
        document.getElementById(
          'applicationsTable'
        );

      table.innerHTML = "";

      let approved = 0;
      let rejected = 0;
      let pending = 0;

      data.forEach(app => {

        if(app.status === 'approved'){
          approved++;
        }
        else if(app.status === 'rejected'){
          rejected++;
        }
        else{
          pending++;
        }

        table.innerHTML += `
          <tr>

            <td>${app.full_name}</td>

            <td>${app.email}</td>

            <td>${app.phone}</td>

            <td>${app.program}</td>

            <td>
              <span class="
                status-${app.status || 'pending'}
              ">
                ${app.status || 'pending'}
              </span>
            </td>

            <td>

              <button
                class="approve"
                onclick="updateStatus(
                  '${app.id}',
                  'approved'
                )"
              >
                Approve
              </button>

              <button
                class="reject"
                onclick="updateStatus(
                  '${app.id}',
                  'rejected'
                )"
              >
                Reject
              </button>

              <button
                class="delete"
                onclick="deleteApplication(
                  '${app.id}'
                )"
              >
                Delete
              </button>

            </td>

          </tr>
        `;
      });

      document.getElementById(
        'totalApplications'
      ).innerText = data.length;

      document.getElementById(
        'approvedApplications'
      ).innerText = approved;

      document.getElementById(
        'rejectedApplications'
      ).innerText = rejected;

      document.getElementById(
        'pendingApplications'
      ).innerText = pending;
    }

    loadApplications();

    // UPDATE STATUS
    async function updateStatus(id, status){

      const { error } =
        await supabaseClient
          .from('applications')
          .update({ status })
          .eq('id', id);

      if(error){
        alert(error.message);
        return;
      }

      loadApplications();
    }

    // DELETE APPLICATION
    async function deleteApplication(id){

      if(!confirm(
        "Delete application?"
      )) return;

      const { error } =
        await supabaseClient
          .from('applications')
          .delete()
          .eq('id', id);

      if(error){
        alert(error.message);
        return;
      }

      loadApplications();
    }

    // CREATE BLOG POST
    async function createPost(){

      const title =
        document.getElementById(
          'blogTitle'
        ).value;

      const content =
        document.getElementById(
          'blogContent'
        ).value;

      const { error } =
        await supabaseClient
          .from('blog_posts')
          .insert([
            {
              title,
              content
            }
          ]);

      if(error){
        alert(error.message);
        return;
      }

      alert("Blog published!");

      document.getElementById(
        'blogTitle'
      ).value = "";

      document.getElementById(
        'blogContent'
      ).value = "";
    }

    // IMAGE UPLOAD
    async function uploadImage(){

      const file =
        document.getElementById(
          'imageFile'
        ).files[0];

      if(!file){
        alert("Choose image first");
        return;
      }

      const fileName =
        Date.now() + "_" + file.name;

      const { error } =
        await supabaseClient.storage
          .from('website-images')
          .upload(fileName, file);

      if(error){
        alert(error.message);
        return;
      }

      const {
        data:publicUrl
      } =
        supabaseClient.storage
          .from('website-images')
          .getPublicUrl(fileName);

      document.getElementById(
        'preview'
      ).src =
        publicUrl.publicUrl;

      alert("Image uploaded!");
    }

    // CREATE ANNOUNCEMENT
    async function createAnnouncement(){

      const title =
        document.getElementById(
          'announcementTitle'
        ).value;

      const content =
        document.getElementById(
          'announcementContent'
        ).value;

      const { error } =
        await supabaseClient
          .from('announcements')
          .insert([
            {
              title,
              content
            }
          ]);

      if(error){
        alert(error.message);
        return;
      }

      alert("Announcement published!");

      document.getElementById(
        'announcementTitle'
      ).value = "";

      document.getElementById(
        'announcementContent'
      ).value = "";
    }

    // EXPORT CSV
    async function exportCSV(){

      const { data } =
        await supabaseClient
          .from('applications')
          .select('*');

      let csv =
        "Name,Email,Phone,Program,Status\n";

      data.forEach(row => {

        csv +=
          `${row.full_name},
           ${row.email},
           ${row.phone},
           ${row.program},
           ${row.status}\n`;
      });

      const blob =
        new Blob([csv]);

      const a =
        document.createElement('a');

      a.href =
        URL.createObjectURL(blob);

      a.download =
        "applications.csv";

      a.click();
    }

    // LOGOUT
    async function logout(){

      await supabaseClient.auth.signOut();

      window.location.href =
        "admin.html";
    }

  </script>

</body>
</html>
