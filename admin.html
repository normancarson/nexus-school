<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:10px;
      width:350px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
    }

    button{
      width:100%;
      padding:12px;
      background:#0a2240;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">

  <h2>Admin Login</h2>

  <input
    type="email"
    id="email"
    placeholder="Admin Email">

  <input
    type="password"
    id="password"
    placeholder="Password">

  <button onclick="login()">
    Login
  </button>

  <p id="status"></p>

</div>

<script>

async function login() {

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  const status =
    document.getElementById('status');

  const { error } =
    await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

  if(error){

    status.innerHTML =
      "❌ " + error.message;

    status.style.color = "red";

    return;
  }

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
